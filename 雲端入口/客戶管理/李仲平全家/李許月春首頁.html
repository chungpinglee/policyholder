        .fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        <h2 class="text-2xl font-black mb-1">數位安全中心</h2>
        <p class="text-slate-500 text-[10px] font-mono mb-8 tracking-widest uppercase">ID: SEC-656168</p>

        <!-- 生物辨識狀態引導 -->
        <div id="bio-hint" class="mb-6 p-4 rounded-3xl bg-cyan-500/5 border border-cyan-500/10 text-xs text-cyan-400">
            <div class="flex items-center justify-center gap-2 mb-1">
                <span class="text-lg">🛡️</span> <span id="bio-title" class="font-bold">原生生物辨識防護</span>

        </div>

        <div id="bio-action" class="hidden mb-6">
            <button onclick="tryBiometric()" class="bio-btn w-full py-5 rounded-2xl font-black flex items-center justify-center gap-3 shadow-xl">
                <span class="text-2xl">👤</span> 使用臉部 / 指紋快速進入
            </button>
            <div class="my-6 flex items-center gap-4 text-slate-700 text-[10px] font-bold uppercase tracking-widest">
                <div class="h-px bg-slate-800 flex-1"></div> 或輸入密碼 <div class="h-px bg-slate-800 flex-1"></div>
            </div>
        </div>

        <div id="password-area" class="space-y-4">
            <input type="password" id="pw" class="w-full p-5 rounded-2xl bg-white/5 border border-white/10 text-center text-xl tracking-[0.5em] focus:border-cyan-500 outline-none transition-all" placeholder="••••••" autofocus>
            <button onclick="verifyAndGuide()" class="w-full bg-white text-slate-900 py-5 rounded-2xl font-black hover:bg-cyan-50 active:scale-95 transition-all shadow-xl">驗證身份並解鎖</button>
        </div>

        <!-- 成功後的註冊引導區 (重要修正) -->
        <div id="enroll-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-6 bg-black/80 backdrop-blur-xl">

                <div class="text-5xl mb-4">🧬</div>
                <h3 class="text-xl font-black mb-2">啟用快速臉部解鎖？</h3>
                <p class="text-xs text-slate-400 mb-6 italic leading-relaxed">下次開啟此檔案時，將不需再手動輸入密碼，系統會自動呼叫生物辨識進行驗證。</p>

                    <button onclick="registerBio()" class="w-full bg-cyan-500 py-4 rounded-2xl font-black text-white hover:bg-cyan-400 transition-all">立即連結此設備</button>
                    <button onclick="finalRenderContent()" class="w-full py-4 text-slate-500 text-xs font-bold hover:text-white transition-all underline">暫時不需要，直接進入檔案</button>
                </div>
            </div>
        </div>

        <p id="err" class="text-rose-500 text-xs mt-6 hidden font-black animate-pulse tracking-widest">❌ 通行碼錯誤，請重新確認</p>

        const STORAGE_KEY = "bio_token_" + btoa(window.location.pathname).substring(0,12);
        let confirmedPassword = "";

        window.onload = async () => {
            const statusText = document.getElementById('bio-status-text');
            if (!window.isSecureContext) {
                statusText.innerText = "⚠️ 非 HTTPS 環境，功能已暫時鎖定。";
                statusText.className = "text-rose-400 font-bold text-[10px]";
            } else if (window.PublicKeyCredential) {
                if (localStorage.getItem(STORAGE_KEY)) {
                    document.getElementById('bio-action').classList.remove('hidden');
                    statusText.innerText = "已連結，請點擊上方按鈕刷臉解鎖。";
                } else {
                    statusText.innerText = "偵測到支援。請先用密碼解鎖以進行設定。";
                }
            } else {
                statusText.innerText = "此設備硬體不支援生物辨識。";
            }
        };

        // 核心邏輯：先驗證但不覆蓋頁面
        async function verifyAndGuide() {
            const pw = document.getElementById('pw').value;
            const success = await testDecrypt(pw);
            if (success) {
                confirmedPassword = pw;
                // 如果環境支援且還沒註冊，彈出註冊導引視窗
                if (window.isSecureContext && window.PublicKeyCredential && !localStorage.getItem(STORAGE_KEY)) {
                    document.getElementById('enroll-modal').classList.remove('hidden');
                } else {
                    finalRenderContent();
                }
            } else {
                document.getElementById('err').classList.remove('hidden');
                document.getElementById('pw').value = '';
            }
        }

        async function tryBiometric() {
            try {
                const cred = await navigator.credentials.get({ publicKey: { challenge: crypto.getRandomValues(new Uint8Array(32)), userVerification: "required" } });
                if (cred) {
                    confirmedPassword = localStorage.getItem(STORAGE_KEY);
                    if (confirmedPassword) await finalRenderContent();
                }
            } catch (e) { console.warn("驗證取消"); }
        }

        async function registerBio() {
            try {
                const cred = await navigator.credentials.create({ publicKey: {
                    challenge: crypto.getRandomValues(new Uint8Array(32)),
                    rp: { name: "加密防護系統" },
                    user: { id: crypto.getRandomValues(new Uint8Array(16)), name: "User", displayName: "User" },
                    pubKeyCredParams: [{ alg: -7, type: "public-key" }],
                    userVerification: "required"
                }});
                if (cred) {
                    localStorage.setItem(STORAGE_KEY, confirmedPassword);
                    alert("✅ 連結成功！下次開啟檔案即可刷臉進入。");
                    finalRenderContent();
                }
            } catch (e) { alert("無法設定：您的設備安全性設定未開啟或不支援。"); finalRenderContent(); }
        }

        // 最終寫入內容
        async function finalRenderContent() {
            const result = await testDecrypt(confirmedPassword);
            if (result) {
                document.open();
                document.write(result);
                document.close();
            }
        }

        // 僅解密而不渲染
        async function testDecrypt(p) {
            try {
                const b = atob(_DATA), u = new Uint8Array(b.length);
                for(let i=0; i<b.length; i++) u[i] = b.charCodeAt(i);
                const bA = u.slice(0, 76), bB = u.slice(76, 152), iv = u.slice(152, 164), dat = u.slice(164);
                const unw = async (bk) => {
                    try {
                        const s = bk.slice(0, 16), i = bk.slice(16, 28), w = bk.slice(28);
                        const kMat = await crypto.subtle.importKey("raw", new TextEncoder().encode(p), "PBKDF2", false, ["deriveKey"]);
                        const dk = await crypto.subtle.deriveKey({ name: "PBKDF2", salt: s, iterations: 1000, hash: "SHA-256" }, kMat, { name: "AES-GCM", length: 256 }, false, ["decrypt"]);
                        return await crypto.subtle.decrypt({ name: "AES-GCM", iv: i }, dk, w);
                    } catch(e) { return null; }
                };
                let raw = await unw(bA) || await unw(bB);
                if (!raw) return null;
                const cKey = await crypto.subtle.importKey("raw", raw, "AES-GCM", false, ["decrypt"]);
                const res = await crypto.subtle.decrypt({ name: "AES-GCM", iv }, cKey, dat);
                return new TextDecoder().decode(res);
            } catch (e) { return null; }
        }
    </script>
