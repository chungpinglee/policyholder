        const globalGithubLink = "https://chungpinglee.github.io/policyholder/理賠-加密檔/";
        let matchedRecord = null;

        function getSafeBaseUrl() {
            let base = globalGithubLink.trim();
            if (!base) return "";
            let decoded = decodeURI(base);
            if (!decoded.endsWith("/")) {
                decoded += "/";
            }
            return decoded;
        }

        function handleSearch() {
            const val = document.getElementById("search-input").value.trim();
            const resultContainer = document.getElementById("result-container");
            const resultName = document.getElementById("result-name");
            const resultLink = document.getElementById("result-link");

            resultContainer.classList.add("hidden");
            matchedRecord = null;

            if (!val) return;

            // 客戶必須精確輸入一致的中文姓名 (完全相符原則)
            const match = claimsData.find(item => item.name.toLowerCase() === val.toLowerCase());
            if (match) {
                matchedRecord = match;
                resultContainer.classList.remove("hidden");
                resultName.innerText = match.name + " 的理賠紀錄";
                
                // 完美防止雙重編碼：採用專屬 CSV 客製化連結或動態合成
                const safeBase = getSafeBaseUrl();
                const rawUrl = match.customUrl ? match.customUrl : encodeURI(safeBase + match.name + "理賠紀錄.html");
                resultLink.href = match.customUrl ? match.customUrl : rawUrl;
            }
        }

        // 語音輸入
        let recognition;
        function startVoiceRecognition() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) {
                alert("您的瀏覽器不支援語音辨識功能。");
                return;
            }
            if (recognition && recognition.listening) {
                recognition.stop();
                return;
            }

            recognition = new SpeechRecognition();
            recognition.lang = 'zh-TW';
            recognition.interimResults = false;

            const micIcon = document.getElementById("mic-icon");
            const voiceWaves = document.getElementById("voice-waves");
            const searchInput = document.getElementById("search-input");

            recognition.onstart = function() {
                recognition.listening = true;
                micIcon.classList.add("text-red-500");
                voiceWaves.classList.remove("hidden");
                searchInput.placeholder = "聆聽聲音中...";
            };

            recognition.onresult = function(event) {
                const speechResult = event.results[0][0].transcript;
                searchInput.value = speechResult.replace(/[。，、？！.]/g, "").trim();
                handleSearch();
            };

            recognition.onend = function() {
                recognition.listening = false;
                micIcon.classList.remove("text-red-500");
                voiceWaves.classList.add("hidden");
                searchInput.placeholder = "請精確輸入您的姓名...";
            };

            recognition.start();
        }
    </script>
