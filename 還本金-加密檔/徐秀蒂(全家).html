        :root {

            --lavender: #967BB6;

            --sunflower: #FFDA03;
            --terracotta: #E2725B;
            --sage: #8A9A5B;
            --sky-blue: #87CEEB;
            --bg-cream: #FFF9E3;
            --text-coffee: #4B3621;
            
            --card-shadow: 0 15px 35px rgba(150, 123, 182, 0.2);
        }

        body, html { 
            height: 100%; margin: 0; 
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "微軟正黑體", sans-serif; 
            background: var(--bg-cream);
            background-image: radial-gradient(circle at 20% 20%, rgba(255, 218, 3, 0.1) 0%, transparent 40%),
                              radial-gradient(circle at 80% 80%, rgba(150, 123, 182, 0.1) 0%, transparent 40%);
            color: var(--text-coffee); 
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .flower-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; opacity: 0.4;
            pointer-events: none;
        }

        .main-card {
            width: 95%; max-width: 450px;
            background: rgba(255, 255, 255, 0.95);
            padding: 30px 40px;
            border-radius: 24px;
            box-shadow: var(--card-shadow);
            border: 3px solid white;
            position: relative;
            backdrop-filter: blur(5px);
            box-sizing: border-box;
            max-height: 98vh;
            overflow-y: auto;
        }

        header { margin-bottom: 20px; text-align: center; }
        h1 { font-size: 1.6rem; margin: 0; color: var(--lavender-dark); font-weight: 800; }
        .subtitle { font-size: 0.9rem; color: var(--sage); margin-top: 8px; font-weight: 600; }

        .upload-area {
            border: 3px dashed var(--lavender);
            border-radius: 20px; padding: 20px; cursor: pointer;
            transition: all 0.3s ease; margin-bottom: 16px; text-align: center;
            background: rgba(150, 123, 182, 0.05);
        }
        .upload-area:hover { transform: scale(1.02); background: rgba(150, 123, 182, 0.1); }

        .field { margin-bottom: 16px; }
        label { display: block; font-size: 0.9rem; font-weight: 700; color: var(--text-coffee); margin-bottom: 6px; }
        input, select {
            width: 100%; background: #ffffff; border: 2px solid var(--lavender);
            padding: 12px 16px; border-radius: 12px; color: var(--text-coffee); outline: none; transition: 0.2s;
            box-sizing: border-box; font-size: 14px; font-family: inherit;
        }
        input:focus, select:focus { border-color: var(--terracotta); box-shadow: 0 0 10px rgba(226, 114, 91, 0.2); }

        .button-group { display: flex; gap: 12px; margin-top: 10px; }

        .btn-main {
            flex: 2; padding: 16px; background: var(--sunflower); color: var(--text-coffee);
            border: none; border-radius: 50px; font-weight: 800; font-size: 1.1rem;
            cursor: pointer; transition: 0.3s;
            box-shadow: 0 4px 15px rgba(255, 218, 3, 0.4);
        }
        .btn-main:hover { background: #f1c40f; transform: translateY(-2px); box-shadow: 0 6px 20px rgba(255, 218, 3, 0.5); }
        
        .btn-clear {
            flex: 1; padding: 16px; background: var(--terracotta); color: white;
            border: none; border-radius: 50px; font-weight: 800; font-size: 0.95rem;
            cursor: pointer; transition: 0.3s;
            box-shadow: 0 4px 15px rgba(226, 114, 91, 0.3);
        }
        .btn-clear:hover { background: #d65d44; transform: translateY(-2px); box-shadow: 0 6px 20px rgba(226, 114, 91, 0.4); }

        .btn-sub {
            padding: 12px 16px; background: var(--sage); color: white;
            border: none; border-radius: 12px; font-weight: 700; font-size: 0.85rem;
            cursor: pointer; transition: 0.3s; white-space: nowrap; width: 100%;
            box-shadow: 0 4px 10px rgba(138, 154, 91, 0.2); margin-bottom: 8px;
        }
        .btn-sub:hover { background: #73824c; transform: translateY(-1px); }

        #overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 249, 227, 0.95); z-index: 1000;
            flex-direction: column; align-items: center; justify-content: center;
        }
        .loading-text { font-size: 1.2rem; color: var(--lavender-dark); font-weight: 700; margin-bottom: 20px; text-align: center; }
        .progress-container { width: 240px; height: 10px; background: #eee; border-radius: 10px; overflow: hidden; border: 2px solid white; }
        .progress-bar { width: 0%; height: 100%; background: linear-gradient(90deg, var(--lavender), var(--sky-blue)); transition: 0.3s; }
        
        .error-msg { color: var(--terracotta); font-weight: bold; text-align: center; margin-top: 10px; min-height: 20px;}

        iframe { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; border: none; z-index: 2000; background: white; }
        .footer-note { margin-top: 20px; font-size: 0.8rem; color: var(--sage); text-align: center; line-height: 1.5; font-style: italic; }

            u_wrapped: "3zYltwRJ4nmvelMiMWXJ3/thZPDo4B4fYO35TGzS+XYF4gDVxPYiDqhXCx28cUa6",

            salt: "N8gmMiNK7vGcgx0lKqkqX4sfnVmucDdmjVFUxX28JVI=",
            iv: "8Ukfy2we9/lgk/oY"

        const dom = {
            btn: document.getElementById('action-btn'),
            pwd: document.getElementById('pwd-input'),
            overlay: document.getElementById('overlay'),
            progress: document.getElementById('progress-bar'),
            status: document.getElementById('status-msg'),
            iframe: document.getElementById('content-viewer'),
            ui: document.getElementById('ui-container'),
            error: document.getElementById('error-display')
        };

        // 3次錯誤鎖定 1 小時機制 (綁定專屬 salt 防跨檔)
        const lockKey = "LOCKED_" + VAULT.salt;
        const attemptsKey = "ATTEMPTS_" + VAULT.salt;

        function checkLockout() {
            const lockTime = localStorage.getItem(lockKey);
            if (lockTime && Date.now() < parseInt(lockTime)) {
                const remainMs = parseInt(lockTime) - Date.now();
                const remainHrs = Math.floor(remainMs / 3600000);
                const remainMins = Math.ceil((remainMs % 3600000) / 60000);
                let timeStr = remainHrs > 0 ? `${remainHrs} 小時 ${remainMins} 分鐘` : `${remainMins} 分鐘`;
                dom.error.innerText = `❄️ 系統已凍結防護。請於 ${timeStr} 後再試。`;
                dom.btn.disabled = true;
                dom.btn.style.background = "#ccc";
                dom.pwd.disabled = true;
                return true;
            }
            if (lockTime && Date.now() >= parseInt(lockTime)) {
                localStorage.removeItem(lockKey);
                localStorage.removeItem(attemptsKey);
            }
            return false;
        }

        function recordFailure() {
            let attempts = parseInt(localStorage.getItem(attemptsKey) || "0") + 1;
            if (attempts >= 3) {
                const unlockTime = Date.now() + 43200000; // 12 hrs (12 * 60 * 60 * 1000)
                localStorage.setItem(lockKey, unlockTime.toString());
                checkLockout();
            } else {
                localStorage.setItem(attemptsKey, attempts.toString());
                dom.error.innerText = `❌ 驗證失敗，剩餘嘗試次數：${3 - attempts} 次`;
            }
        }

        window.onload = () => { checkLockout(); };

        dom.btn.onclick = async () => {
            if (checkLockout()) return;
            const pwd = dom.pwd.value;
            if (!pwd) return;
            dom.error.innerText = "";
            dom.overlay.style.display = 'flex';
            updateUI(40, "正在校驗安全密鑰... 🧺");

            setTimeout(async () => {
                try {
                    const salt = b64ToU8(VAULT.salt);
                    const iv = b64ToU8(VAULT.iv);
                    const inputKek = await derive(pwd, salt);
                    let dek = null;
                    
                    try {
                        const dec = await aesDec(b64ToU8(VAULT.u_wrapped), inputKek, iv);
                        dek = new Uint8Array(dec);
                    } catch (e) {
                        try {
                            const dec = await aesDec(b64ToU8(VAULT.a_wrapped), inputKek, iv);
                            dek = new Uint8Array(dec);
                        } catch (e2) {
                            throw "INVALID_KEY";
                        }
                    }
                    
                    updateUI(80, "金鑰正確，開啟內容... ✨");
                    localStorage.removeItem(attemptsKey); // 成功即重置錯誤次數
                    const finalBuf = await aesDec(b64ToU8(VAULT.payload), dek, iv);
                    render(new TextDecoder().decode(finalBuf));
                } catch (err) {
                    recordFailure();
                    updateUI(100, "❌ 密鑰不正確");
                    setTimeout(() => dom.overlay.style.display = 'none', 1500);
                }
            }, 300);
        };

        async function derive(p, s) {
            const mat = await crypto.subtle.importKey("raw", new TextEncoder().encode(p), "PBKDF2", false, ["deriveKey"]);
            return crypto.subtle.deriveKey(
                { name: "PBKDF2", salt: s, iterations: CONFIG.iter, hash: "SHA-256" },
                mat, { name: "AES-GCM", length: 256 }, false, ["encrypt", "decrypt"]
            );
        }

        async function aesDec(c, kR, iv) {
            const k = (kR instanceof Uint8Array) ? await crypto.subtle.importKey("raw", kR, "AES-GCM", false, ["decrypt"]) : kR;
            return await crypto.subtle.decrypt({ name: "AES-GCM", iv }, k, c);
        }

        function render(h) {
            dom.ui.style.display = 'none';
            dom.overlay.style.display = 'none';
            dom.iframe.style.display = 'block';
            dom.iframe.src = URL.createObjectURL(new Blob([h], { type: 'text/html' }));
        }

        function updateUI(p, m) { dom.progress.style.width = p + "%"; dom.status.innerText = m; }
        function b64ToU8(b64) {
            const b = atob(b64);
            const u = new Uint8Array(b.length);
            for (let i = 0; i < b.length; i++) u[i] = b.charCodeAt(i);
            return u;
        }
